{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>All Tests</h2>
    <a class="btn" href="{{ url_for('create_test') }}">Create Test</a>
    <table>
        <tr><th>ID</th><th>Name</th><th>Teacher</th><th>Actions</th></tr>
        {% for t in rows %}
        <tr>
            <td>{{ t['id'] }}</td>
            <td>{{ t['name'] }}</td>
            <td>{{ t['teacher_name'] }}</td>
            <td>
                <a class="btn" href="{{ url_for('edit_test', test_id=t['id']) }}">Edit</a>
                <a class="btn" href="{{ url_for('take_test', test_id=t['id']) }}">Take</a>
                <a class="btn" href="{{ url_for('test_responses', test_id=t['id']) }}">Responses</a>
                <form class="inline" method="post" action="{{ url_for('delete_test', test_id=t['id']) }}"><button class="btn btn-danger" type="submit">Delete</button></form>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
